    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* Sticker size: 10cm × 15cm (3.94in × 5.91in) */
        .sticker-container {
            width: 10cm;
            height: 15cm;
            background: white;
            position: relative;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* For print media - Thermal Printer Optimization */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            @page { 
                size: 10cm 15cm; 
                margin: 0; 
            }
            
            body { 
                margin: 0 !important;
                padding: 0 !important;
                background: white;
                -webkit-print-color-adjust: exact;
                -webkit-filter: contrast(1.2) brightness(1.1);
                filter: contrast(1.2) brightness(1.1);
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            
            .sticker-container {
                width: 100% !important;
                height: 100% !important;
                border: none;
                box-shadow: none;
                page-break-inside: avoid;
                margin: 0;
                padding: 8px 6px;
                background: white !important;
                position: relative;
            }
            
            /* Thermal printer text optimization */
            .sticker-title,
            .sticker-label,
            .sticker-value,
            .sticker-large-value {
                color: #000000 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                text-shadow: none !important;
            }
            
            /* Enhance contrast for thermal printing */
            .sticker-title {
                -webkit-text-stroke: 0.3px #000000;
                text-rendering: geometricPrecision;
            }
            
            .sticker-large-value {
                -webkit-text-stroke: 0.2px #000000;
            }
            
            /* Remove decorative colors for thermal - use black only */
            [style*="color: #ea580c"],
            [style*="color: #6b7280"],
            [style*="color: #374151"],
            [style*="color: #4b5563"],
            [style*="color: #111827"],
            [style*="color: #1f2937"] {
                color: #000000 !important;
            }
            
            .bg-orange-500 {
                display: none;
            }
            
            /* Border optimization for thermal */
            .border-t,
            .border-gray-300 {
                border-color: #000000 !important;
                -webkit-print-color-adjust: exact !important;
            }
        }

        /* Barcode styles - Thermal optimized */
        .barcode-container {
            width: 100%;
            text-align: center;
            margin: 0 auto;
            padding: 4px 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Font styles for better readability - Thermal optimized */
        .sticker-title {
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
            letter-spacing: 0.2px;
            line-height: 1.1;
        }

        .sticker-label {
            font-weight: 800;
            font-size: 9px;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            line-height: 1.2;
            font-family: 'Roboto Mono', monospace;
        }

        .sticker-value {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 11px;
            color: #000000;
            line-height: 1.2;
            letter-spacing: 0.05px;
        }

        .sticker-large-value {
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
            font-size: 16px;
            color: #000000;
            line-height: 1.1;
            letter-spacing: 0.1px;
        }

        /* Animation classes */
        .slide-up {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Thermal Printer CSS Variables */
        :root {
            --thermal-black: #000000;
            --thermal-white: #ffffff;
            --thermal-border: #000000;
        }

        /* Arabic support */
        [dir="rtl"] .rtl-space-x-reverse > :not([hidden]) ~ :not([hidden]) {
            --tw-space-x-reverse: 1;
        }

        /* Card hover effects */
        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Status badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
        }

        .status-in-stock {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-shipped {
            background-color: #dbeafe;
            color: #1e40af;
        }

        /* Utility classes for thermal printing */
        .text-6px {
            font-size: 6px !important;
        }

        .text-7px {
            font-size: 7px !important;
        }

        .text-xs {
            font-size: 10px !important;
        }

        .text-sm {
            font-size: 14px !important;
        }

        @media print {
            .text-6px { font-size: 6px !important; }
            .text-7px { font-size: 7px !important; }
            .text-xs { font-size: 10px !important; }
            .text-sm { font-size: 14px !important; }
        }
    </style>

        // ==================== UTILITY FUNCTIONS ====================
        function t(key) {
            return translations[appState.language][key] || key;
        }

        function formatDate(date = new Date()) {
            return date.toISOString().split('T')[0];
        }

        function generatePalletCode() {
            const date = new Date();
            const year = date.getFullYear().toString().slice(-2);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const random = Math.floor(Math.random() * 9000 + 1000);
            return `NF${year}${month}${day}${random}`;
        }

        function generateTrackingCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 10; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateShipmentNumber() {
            const date = new Date();
            const year = date.getFullYear().toString().slice(-2);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const random = Math.floor(Math.random() * 900 + 100);
            return `SH${year}${month}${day}${random}`;
        }

        function saveToLocalStorage() {
            localStorage.setItem('nubafarm_pallets', JSON.stringify(appState.pallets));
            localStorage.setItem('nubafarm_shipments', JSON.stringify(appState.shipments));
            localStorage.setItem('nubafarm_customers', JSON.stringify(appState.customers));
            localStorage.setItem('nubafarm_lang', appState.language);
            localStorage.setItem('nubafarm_pin', appState.pinCode);
        }

        function loadFromLocalStorage() {
            const savedPallets = localStorage.getItem('nubafarm_pallets');
            const savedShipments = localStorage.getItem('nubafarm_shipments');
            const savedCustomers = localStorage.getItem('nubafarm_customers');
            const savedLang = localStorage.getItem('nubafarm_lang');
            const savedPin = localStorage.getItem('nubafarm_pin');
            
            if (savedPallets) appState.pallets = JSON.parse(savedPallets);
            if (savedShipments) appState.shipments = JSON.parse(savedShipments);
            if (savedCustomers) appState.customers = JSON.parse(savedCustomers);
            if (savedLang && (savedLang === 'en' || savedLang === 'ar')) appState.language = savedLang;
            if (savedPin) appState.pinCode = savedPin;
        }

            const colors = {
                success: 'bg-green-100 border-green-500 text-green-700',
                error: 'bg-red-100 border-red-500 text-red-700',
                info: 'bg-blue-100 border-blue-500 text-blue-700',
                warning: 'bg-orange-100 border-orange-500 text-orange-700'

                // Fallback if barcode library fails

        function generateNewPallet() {
            const product = document.getElementById('product-select').value;
            const size = parseInt(document.getElementById('size-select').value);
            const category = document.getElementById('category-select').value;
            const packageTypeId = document.getElementById('package-type-select').value;
            const color = document.getElementById('color-select').value;
            const quantity = parseInt(document.getElementById('quantity-input').value) || 100;
            const palletType = document.getElementById('pallet-type-select').value;
            
            const packageType = appState.packageTypes.find(p => p.id === packageTypeId);
            const netWeight = quantity * packageType.weight;
            
            const newPallet = {
                palletCode: generatePalletCode(),
                trackingCode: generateTrackingCode(),
                product,
                category,
                packageType: packageTypeId,
                packageName: packageType.name,
                size,
                palletType,
                color,
                quantity,
                netWeight,
                status: 'In Stock',
                productionDate: formatDate()
            };
            
            appState.pallets.push(newPallet);
            saveToLocalStorage();
            showNotification(t('palletGenerated'), 'success');
            
            // Print the sticker automatically
            printSticker(newPallet);
            
            // Go to inventory tab
            setActiveTab('inventory');
        }

                                        <p class="text-2xl font-black">${appState.customers.length}</p>
                                    </div>
                                    
                                    <div class="p-4 bg-slate-50 rounded-lg">
                                        <p class="text-xs text-slate-500 mb-1">${t('systemLanguage') || 'Language'}</p>
                                        <p class="text-2xl font-black">${appState.language.toUpperCase()}</p>
                                    </div>
                                </div>
                                
                                <!-- Clear Data Button -->
                                <div>
                                    <button onclick="showClearConfirmation()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-700 transition-colors flex items-center justify-center space-x-2 rtl:space-x-reverse">
                                        <i class="fas fa-trash-alt"></i>
                                        <span>${t('clearData')}</span>
                                    </button>
                                    
                                    <p class="text-xs text-slate-500 mt-3 text-center">
                                        ${t('clearWarning') || 'This action cannot be undone. Make sure to backup your data first.'}
                                    </p>
                                </div>
                            </div>
                            
                            <!-- System Information -->
                            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                <h2 class="text-lg font-black text-slate-900 mb-6">${t('systemInfo') || 'System Information'}</h2>
                                
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg">
                                        <span class="font-medium">${t('version') || 'Version'}</span>
                                        <span class="font-mono">2.1 (Android)</span>
                                    </div>
                                    
                                    <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg">
                                        <span class="font-medium">${t('developer') || 'Developer'}</span>
                                        <span>Omar Elshafey</span>
                                    </div>
                                    
                                    <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg">
                                        <span class="font-medium">${t('lastUpdated') || 'Last Updated'}</span>
                                        <span>${formatDate()}</span>
                                    </div>
                                    
                                    <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg">
                                        <span class="font-medium">${t('browserStorage') || 'Browser Storage'}</span>
                                        <span>${localStorage.getItem('nubafarm_pallets') ? t('enabled') || 'Enabled' : t('disabled') || 'Disabled'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== LOADING FUNCTIONS ====================
        function toggleAllPallets(checked) {
            const checkboxes = document.querySelectorAll('.pallet-checkbox');
            checkboxes.forEach(cb => cb.checked = checked);
            updateShipmentSummary();
        }

        function updateShipmentSummary() {
            const checkboxes = document.querySelectorAll('.pallet-checkbox:checked');
            const selectedCount = checkboxes.length;
            let totalWeight = 0;
            
            checkboxes.forEach(cb => {
                totalWeight += parseFloat(cb.dataset.weight) || 0;
            });
            
            document.getElementById('selected-count').textContent = selectedCount;
            document.getElementById('total-weight').textContent = `${totalWeight} KG`;
        }

        function createShipment() {
            const customer = document.getElementById('shipment-customer').value;
            const port = document.getElementById('shipment-port').value;
            const shippingLine = document.getElementById('shipment-line').value;
            const container = document.getElementById('shipment-container').value;
            
            if (!customer || !port || !shippingLine || !container) {
                showNotification(t('fillAllFields') || 'Please fill all fields', 'error');
                return;
            }
            
            const selectedCheckboxes = document.querySelectorAll('.pallet-checkbox:checked');
            if (selectedCheckboxes.length === 0) {
                showNotification(t('selectAtLeastOnePallet') || 'Select at least one pallet', 'error');
                return;
            }
            
            const selectedPallets = Array.from(selectedCheckboxes).map(cb => cb.value);
            let totalWeight = 0;
            let palletCount = 0;
            
            // Update pallet status to shipped
            selectedPallets.forEach(palletCode => {
                const pallet = appState.pallets.find(p => p.palletCode === palletCode);
                if (pallet) {
                    pallet.status = 'Shipped';
                    totalWeight += pallet.netWeight;
                    palletCount++;
                }
            });
            
            const newShipment = {
                shipmentNumber: generateShipmentNumber(),
                customer,
                destination: port,
                shippingLine,
                container,
                palletCount,
                totalWeight,
                shippingDate: formatDate(),
                pallets: selectedPallets
            };
            
            appState.shipments.unshift(newShipment);
            saveToLocalStorage();
            showNotification(t('shipmentCreated'), 'success');
            
            // Reset form
            document.getElementById('shipment-customer').value = '';
            document.getElementById('shipment-port').value = '';
            document.getElementById('shipment-line').value = '';
            document.getElementById('shipment-container').value = '';
            document.querySelectorAll('.pallet-checkbox').forEach(cb => cb.checked = false);
            updateShipmentSummary();
            
            // Refresh the loading tab
            renderContent();
        }

        // ==================== SETTINGS FUNCTIONS ====================
        function addCustomer() {
            const customerInput = document.getElementById('new-customer');
            const customerName = customerInput.value.trim();
            
            if (!customerName) {
                showNotification(t('enterCustomerName') || 'Enter customer name', 'error');
                return;
            }
            
            if (appState.customers.includes(customerName)) {
                showNotification(t('customerAlreadyExists') || 'Customer already exists', 'error');
                return;
            }
            
            appState.customers.push(customerName);
            saveToLocalStorage();
            showNotification(t('customerAdded'), 'success');
            customerInput.value = '';
            
            // Refresh settings tab
            renderContent();
        }

        function deleteCustomer(customerName) {
            if (!confirm(t('confirmDeleteCustomer') || `Delete ${customerName}?`)) {
                return;
            }
            
            appState.customers = appState.customers.filter(c => c !== customerName);
            saveToLocalStorage();
            showNotification(t('customerDeleted'), 'success');
            
            // Refresh settings tab
            renderContent();
        }

        function changePinCode() {
            const currentPin = document.getElementById('current-pin').value;
            const newPin = document.getElementById('new-pin').value;
            const confirmPin = document.getElementById('confirm-pin').value;
            
            if (!currentPin || !newPin || !confirmPin) {
                showNotification(t('fillAllPinFields') || 'Fill all PIN fields', 'error');
                return;
            }
            
            if (currentPin !== appState.pinCode) {
                showNotification(t('incorrectPin'), 'error');
                return;
            }
            
            if (newPin !== confirmPin) {
                showNotification(t('pinsDoNotMatch'), 'error');
                return;
            }
            
            appState.pinCode = newPin;
            saveToLocalStorage();
            showNotification(t('pinChanged'), 'success');
            
            // Clear inputs
            document.getElementById('current-pin').value = '';
            document.getElementById('new-pin').value = '';
            document.getElementById('confirm-pin').value = '';
        }

        function showClearConfirmation() {
            if (confirm(t('confirmClear'))) {
                clearAllData();
            }
        }

        function clearAllData() {
            appState.pallets = [];
            appState.shipments = [];
            appState.customers = ["Global Fruits Ltd", "Fresh Market Europe", "Gulf Traders"];
            saveToLocalStorage();
            showNotification(t('dataCleared'), 'success');
            
            // Refresh current tab
            renderContent();
        }

        // ==================== INITIALIZATION ====================
        function initializeApp() {
            loadFromLocalStorage();
            updateLanguageButton();
            document.getElementById('app-container').dir = t('dir');
            renderNavigation();
            renderContent();
            
            setTimeout(() => {
                showNotification(`${t('welcome')} to NubaFarm System v2.1`, 'info');
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', initializeApp);

        // Event listener for pallet checkboxes
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('pallet-checkbox')) {
                updateShipmentSummary();
            }
        });
    </script>
</body>
</html>
